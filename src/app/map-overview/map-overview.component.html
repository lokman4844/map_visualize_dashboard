<div class="map-overview h-full flex flex-col">
  <div class="px-6 py-4 bg-sky-500 backdrop-blur-md border-b border-white/10 flex justify-between items-center">
    <div>
      <h2 class="text-2xl font-bold text-white uppercase tracking-wider">Offshore Asset Overview</h2>
      <p class="text-sm text-gray-900">Viewing Block SK311 - South Acis Field</p>
    </div>
    <div class="flex gap-4">
      <div class="badge badge-primary gap-2">
        <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
        Active Platform
      </div>
    </div>
  </div>

  <div class="flex-1 relative">
    <!-- Leaflet Map Container -->
    <div #mapContainer id="leaflet-map" class="w-full h-full"></div>

    <!-- Custom Overlay for Coordinates -->
    <div
      class="absolute bottom-6 left-6 p-4 bg-gray-900/80 backdrop-blur-md rounded-xl border border-white/10 text-white shadow-2xl z-[1000]">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-2 h-8 bg-primary rounded-full"></div>
        <h3 class="font-bold text-lg">South Acis Platform</h3>
      </div>
      <div class="grid grid-cols-2 gap-x-8 gap-y-1 text-sm">
        <span class="text-gray-400">Latitude:</span>
        <span class="font-mono">{{center.lat}}° N</span>
        <span class="text-gray-400">Longitude:</span>
        <span class="font-mono">{{center.lng}}° E</span>
      </div>
    </div>
  </div>
</div>
